<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtiler innerer Rahmen -->
  <rect x="16" y="16" width="480" height="480" rx="98" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.35"/>

  <!-- Mortarboard Hut -->
  <!-- Kappe -->
  <rect x="160" y="100" width="192" height="170" rx="12" fill="url(#accent)" filter="url(#glow)"/>
  <!-- Platte oben -->
  <rect x="120" y="148" width="272" height="36" rx="18" fill="url(#gold)"/>
  <!-- Quaste rechts -->
  <line x1="388" y1="166" x2="420" y2="210" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="426" cy="220" r="14" fill="#fbbf24"/>
  <!-- Streifen im Hut (Zierde) -->
  <rect x="184" y="130" width="144" height="6" rx="3" fill="white" opacity="0.15"/>

  <!-- Offenes Buch unten -->
  <!-- Linke Seite -->
  <rect x="88" y="285" width="152" height="128" rx="10" fill="url(#accent)" opacity="0.9"/>
  <!-- Rechte Seite -->
  <rect x="248" y="285" width="152" height="128" rx="10" fill="#6366f1" opacity="0.8"/>
  <!-- Mittelbindung -->
  <rect x="242" y="280" width="12" height="138" rx="6" fill="#0a0a14"/>
  <!-- Seiten-Linien links -->
  <line x1="108" y1="310" x2="224" y2="310" stroke="white" stroke-width="5" opacity="0.45" stroke-linecap="round"/>
  <line x1="108" y1="330" x2="224" y2="330" stroke="white" stroke-width="5" opacity="0.45" stroke-linecap="round"/>
  <line x1="108" y1="350" x2="224" y2="350" stroke="white" stroke-width="5" opacity="0.45" stroke-linecap="round"/>
  <line x1="108" y1="370" x2="180" y2="370" stroke="white" stroke-width="5" opacity="0.3" stroke-linecap="round"/>
  <!-- Seiten-Linien rechts -->
  <line x1="268" y1="310" x2="382" y2="310" stroke="white" stroke-width="5" opacity="0.35" stroke-linecap="round"/>
  <line x1="268" y1="330" x2="382" y2="330" stroke="white" stroke-width="5" opacity="0.35" stroke-linecap="round"/>
  <line x1="268" y1="350" x2="382" y2="350" stroke="white" stroke-width="5" opacity="0.35" stroke-linecap="round"/>
  <line x1="268" y1="370" x2="340" y2="370" stroke="white" stroke-width="5" opacity="0.25" stroke-linecap="round"/>

  <!-- Glühen unter dem Buch -->
  <ellipse cx="256" cy="424" rx="130" ry="16" fill="#818cf8" opacity="0.2"/>
</svg>
