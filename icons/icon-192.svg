<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Hintergrund -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Hintergrund Rund -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>

  <!-- Glühendes Neon-Rechteck (Rahmen) -->
  <rect x="10" y="10" width="172" height="172" rx="34" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>

  <!-- Abschlusskappe (Mortarboard oben) -->
  <!-- Board (Quadrat, gedreht 45°) -->
  <rect x="64" y="42" width="64" height="64" rx="4" fill="url(#accent)" transform="rotate(0 96 74)"/>
  <!-- Vereinfachtes Mortarboard: flache Platte oben -->
  <rect x="52" y="58" width="88" height="12" rx="6" fill="url(#gold)"/>
  <!-- Quaste -->
  <line x1="136" y1="64" x2="148" y2="80" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <circle cx="150" cy="83" r="5" fill="#fbbf24"/>

  <!-- Aufgeschlagenes Buch (unten) -->
  <rect x="36" y="108" width="50" height="42" rx="4" fill="url(#accent)" opacity="0.9"/>
  <rect x="90" y="108" width="50" height="42" rx="4" fill="url(#accent)" opacity="0.7"/>
  <!-- Buchmitte -->
  <line x1="88" y1="108" x2="88" y2="150" stroke="#0a0a14" stroke-width="3"/>
  <!-- Linien (Seiten) -->
  <line x1="44" y1="118" x2="78" y2="118" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="44" y1="126" x2="78" y2="126" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="44" y1="134" x2="78" y2="134" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="96" y1="118" x2="130" y2="118" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="96" y1="126" x2="130" y2="126" stroke="white" stroke-width="2" opacity="0.5"/>
  <line x1="96" y1="134" x2="130" y2="134" stroke="white" stroke-width="2" opacity="0.5"/>

  <!-- Schein/Glow unter dem Buch -->
  <ellipse cx="96" cy="158" rx="44" ry="6" fill="#818cf8" opacity="0.25"/>
</svg>
